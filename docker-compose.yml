version: "3.9"

services:
  api:
    build: .
    container_name: mabdel-backend-api
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      mongo:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - uploads_data:/app/uploads

  mongo:
    image: mongo:7
    container_name: mabdel-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  mongo_data:
  uploads_data:
